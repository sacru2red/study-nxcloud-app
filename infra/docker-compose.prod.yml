# Production stack (Oracle Cloud Free VM / single host)
# Usage (from repo root):
#   cp infra/.env.prod.example .env   # edit secrets & API keys
#   docker compose -f infra/docker-compose.prod.yml up -d --build

name: nxcloud-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nxcloud-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nxcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nxcloud_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-app.sql:ro
      - ./postgres/02-create-nextcloud-db.sql:/docker-entrypoint-initdb.d/02-create-nextcloud-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nxcloud}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nextcloud:
    image: nextcloud:33-apache
    container_name: nxcloud-nextcloud
    restart: always
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?set NEXTCLOUD_ADMIN_PASSWORD in .env}
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${POSTGRES_USER:-nxcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  init-nextcloud:
    image: alpine:3.19
    container_name: nxcloud-init-nextcloud
    restart: 'no'
    environment:
      NEXTCLOUD_URL: http://nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASS: ${NEXTCLOUD_ADMIN_PASSWORD:?set NEXTCLOUD_ADMIN_PASSWORD in .env}
    volumes:
      - ./init-nextcloud.sh:/init-nextcloud.sh:ro
    entrypoint: ['/bin/sh', '/init-nextcloud.sh']
    depends_on:
      - nextcloud
    networks:
      - internal

  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
      target: backend
    container_name: nxcloud-backend
    restart: always
    env_file:
      - ../.env
    environment:
      BACKEND_PORT: '3000'
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-nxcloud}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nxcloud}:${POSTGRES_PASSWORD}@postgres:5432/nxcloud_app
      NEXTCLOUD_URL: http://nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASS: ${NEXTCLOUD_ADMIN_PASSWORD}
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      init-nextcloud:
        condition: service_completed_successfully
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
      target: web
    container_name: nxcloud-web
    restart: always
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  nextcloud_data:

networks:
  internal:
    driver: bridge
